        $(document).ready(function () {

            let gCurPic = 0;

            fillData();

            function fillData() {

                //<div class="item">
                //    <!--<span id="PicTitle">Above Island</span>-->
                //    <img src="\kitchen\above main island\PXL_20260502_193848095.jpg" alt="Above Island 2" class="img-responsive">
                //</div>

                let htmlData = "";
                for (let i = 0; i < pics.length; ++i) {

                    let classData = (i === 0) ? "item active" : "item";
                    htmlData += "<div class=\"" + classData + "\">\n" +
                        "<!--< span id =\"" + "pic" + i + "\">" + pics[i].title + "</span>-->\n" +
                        "<img src=\"" + pics[i].file + "\" alt=\"" + pics[i].title + "\" class=\"img-responsive\">\n" +
                        "</div>\n";
                }
                $("#DataDiv").html(htmlData);
            }

            $('#myCarousel').on('slide.bs.carousel', function (e) {

                if (e.direction === "left")
                    ++gCurPic;
                else if (e.direction === "right")
                    --gCurPic;
                if (gCurPic < 0)
                    gCurPic = pics.length - 1;
                else if (gCurPic >= pics.length)
                    gCurPic = 0;

                $("#hdrTitle").html("<b>" + pics[gCurPic].title + "</b>");
            });
        });

    </script>
